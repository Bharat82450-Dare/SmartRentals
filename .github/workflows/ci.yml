name: SmartRentals CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies locally (Verification)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Lint Code Base (Optional step)
      run: |
        echo "Code is ready for building."

    - name: Build Docker Image
      run: |
        docker build -t smartrentals:latest .
        
    - name: Verify Docker Image Creation
      run: |
        docker images | grep smartrentals
