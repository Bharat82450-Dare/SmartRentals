<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tenant Login | smartRentals</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        :root { --accent: #FF5F38; --accent-glow: rgba(255,95,56,0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 60%, #24243e 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255,255,255,0.97); border-radius: 20px; padding: 48px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
            animation: fadeInUp 0.5s ease both;
        }
        .login-logo { text-align: center; margin-bottom: 8px; font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
        .login-logo span { color: var(--accent); }
        .login-subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 32px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.88rem; color: #555; }
        .form-control {
            width: 100%; padding: 12px 14px; border: 2px solid #e8eaf0;
            border-radius: 10px; font-family: inherit; font-size: 0.93rem;
            transition: border-color 0.2s; background: #fafbfc; color: #1a1a2e;
        }
        .form-control:focus { outline: none; border-color: var(--accent); background: #fff; }
        .btn-login {
            width: 100%; padding: 13px; border-radius: 10px; border: none;
            background: linear-gradient(135deg, var(--accent), #ff8a65);
            color: white; font-family: inherit; font-size: 1rem; font-weight: 700;
            cursor: pointer; box-shadow: 0 6px 20px var(--accent-glow); transition: all 0.25s;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--accent-glow); }
        .error-msg { background: #fee2e2; color: #b91c1c; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.88rem; }
        .back-link { text-align: center; margin-top: 20px; font-size: 0.85rem; color: #888; }
        .back-link a { color: var(--accent); font-weight: 600; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">smart<span>Rentals</span></div>
        <p class="login-subtitle"><i class="fas fa-user-circle"></i> Tenant Portal Login</p>
        {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label><i class="fas fa-phone-alt"></i> Phone Number</label>
                <input type="tel" name="phone" class="form-control" required placeholder="+91 XXXXX XXXXX" autofocus>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" class="form-control" required placeholder="Your portal password">
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
        </form>
        <p class="back-link"><a href="/"><i class="fas fa-home"></i> Back to Home</a></p>
    </div>
</body>
</html>
